{% extends 'layout.html' %}
{% block title %}
    Photos
{% endblock %}

{% block content %}
     {% for photo in photos %}
            <article class='animation'>
                <h2>
                    <a href = "{% url 'photos:picture' name=photo.title %}">
                        {{ photo.title }}
                    </a>
                </h2>
                <p>{{ photo.date }} by {{ photo.owner }}</p>
            </article>
    {% endfor %}
{% endblock %}
